<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Aspirante</title>
<style>
/* General */
body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #f4f6f8;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Contenedor principal */
.login-wrapper {
    display: flex;
    max-width: 900px;
    width: 100%;
    height: 500px;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 15px 40px rgba(0,0,0,0.08);
    background: #fff;
}

/* Carrusel izquierdo */
.carousel {
    flex: 1;
    position: relative;
    overflow: hidden;
}

.carousel img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    top: 0;
    left: 0;
    opacity: 0;
    animation: slide 12s infinite;
}

.carousel img:nth-child(1) { animation-delay: 0s; }
.carousel img:nth-child(2) { animation-delay: 4s; }
.carousel img:nth-child(3) { animation-delay: 8s; }

@keyframes slide {
    0% { opacity: 0; }
    8% { opacity: 1; }
    33% { opacity: 1; }
    41% { opacity: 0; }
    100% { opacity: 0; }
}

/* Formulario derecho */
.login-card {
    flex: 1;
    padding: 40px 30px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: #fff;
}

.login-card h2 {
    margin-bottom: 30px;
    color: #1f2a38;
    font-weight: 700;
}

.login-card form {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.login-card input {
    padding: 12px 15px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 1rem;
    transition: all 0.3s ease;
}

.login-card input:focus {
    border-color: #0d6efd;
    box-shadow: 0 0 8px rgba(13,110,253,0.2);
    outline: none;
}

.login-card button {
    padding: 12px;
    border-radius: 50px;
    border: none;
    background: linear-gradient(90deg, #0d6efd, #0056b3);
    color: #fff;
    font-weight: 600;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.3s ease;
}

.login-card button:hover {
    transform: scale(1.03);
    background: linear-gradient(90deg, #0056b3, #0d6efd);
}

/* Botón volver */
.back-button {
    margin-top: 20px;
    background: #ccc;
    color: #1f2a38;
}

.back-button:hover {
    background: #999;
    transform: scale(1.03);
}

/* Responsive */
@media (max-width: 768px){
    .login-wrapper {
        flex-direction: column;
        height: auto;
        max-width: 400px;
    }
    .carousel {
        height: 200px;
    }
}
</style>
</head>
<body>
<div class="login-wrapper">
    <!-- Carrusel -->
    <div class="carousel">
        <img src="https://picsum.photos/id/1015/500/500" alt="Imagen 1">
        <img src="https://picsum.photos/id/1016/500/500" alt="Imagen 2">
        <img src="https://picsum.photos/id/1018/500/500" alt="Imagen 3">
    </div>

    <!-- Card login -->
    <div class="login-card">
        <h2>Iniciar Sesión</h2>
        <form method="POST">
            <input type="email" name="correo" placeholder="Correo" required>
            <input type="password" name="password" placeholder="Contraseña" required>
            <button type="submit">Ingresar</button>
        </form>
        <a href="/" class="back-button button" style="text-decoration:none; display:inline-block; padding:10px 20px; border-radius:50px; text-align:center;">Volver</a>
    </div>
</div>
</body>
</html>
